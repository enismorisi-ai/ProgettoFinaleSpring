<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>

    <div class="min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-11 col-lg-9 col-xl-8">
                    <div class="auth-panel rounded-4 shadow-lg p-4 mx-auto" style="width:min(100%, 980px); max-width: 980px; min-height: 72vh; background-color: rgba(255,255,255,0.97); box-sizing: border-box;">
                        <div class="text-center mb-4">
                            <h2 class="mb-0">Login</h2>
                        </div>
                        <div class="d-flex flex-column justify-content-center h-100">
                            <div th:if="${param.error}">
                                <div class="alert alert-danger">Invalid Email or Password</div>
                            </div>
                            <div th:if="${param.logout}">
                                <div class="alert alert-success">You have been logged out.</div>
                            </div>
                            <form th:action="@{/login}" method="post" role="form" class="form-horizontal">
                                <div class="form-group mb-3">
                                    <label for="username" class="form-label">Email</label>
                                    <input type="text" id="username" class="form-control" name="username" placeholder="email address">
                                </div>
                                <div class="form-group mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" id="password" class="form-control" name="password">
                                </div>
                                <div class="row gx-3 gy-3 mt-4 align-items-center">
                                    <div class="col-12 col-sm-auto">
                                        <button type="submit" class="btn btn-primary btn-lg px-4 w-100 w-sm-auto">Submit</button>
                                    </div>
                                    <div class="col-12 col-sm">
                                        <span class="d-block">Not Registered? <a th:href="@{/register}">Register/Signup here</a></span>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
</body>
</html>
