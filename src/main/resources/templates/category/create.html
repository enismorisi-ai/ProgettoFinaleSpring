<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>

    
    <div class="container">
        <div class="row">
            <header class="col-12">
                <h1 th:text="${title}" class="text-center">Inserisci una categoria</h1>
            </header>

            <div class="col-12 my-5">
                <form th:action="@{/categories}" method="post" th:object="${category}">
                    <div class="row mb-3">
                        <div class="col">
                            <label for="name" class="form-label">Nome categoria</label>
                            <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Inserisci il nome della categoria">
                            <p th:errors="*{name}" class="text-danger" th:if="${#fields.hasErrors('name')}"></p>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success">Crea categoria</button>
                </form>
            </div>
        </div>
    </div>


    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
</body>
</html>
