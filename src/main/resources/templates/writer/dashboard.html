<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>

    <div th:if="${successMessage}" class="alert alert-success">
        <p th:text="${successMessage}"></p>
    </div>


    <div class="container">
        <div class="row">
            <div class="col-12 my-5">
                <h1 class="text-center">Dashboard Writer</h1>
            </div>

            <div class="col-12 my-5">
                <h2 class="text-center" th:text="${title}">[i tuoi articoli]</h2>
            </div>

            <div class="col-12">
                <table class="table table-striped table-responsive-lg">
                    <thead>
                        <tr>
                            <!-- <th>Id</th> -->
                            <th>Title</th>
                            <th>Subtitle</th>
                            <th>Category</th>
                            <th>#Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="article:${articles}">
                            <!-- <td th:text="${article.id}"></td> -->
                            <td th:text="${article.title}"></td>
                            <td th:text="${article.subtitle}"></td>
                            <td th:if="${article.category}" th:text="${article.category.name}"></td>
                            <td th:unless="${article.category}">Nessuna categoria</td>
                            <td>
                                <a th:href="@{/articles/detail/{id}(id=${article.id})}" class="btn btn-primary m-2">
                                    <i class="fa-solid fa-bars"></i>
                                </a>
                                <a th:href="@{/articles/edit/{id}(id=${article.id})}" class="btn btn-warning m-2">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <a th:href="@{/articles/delete/{id}(id=${article.id})}" class="btn btn-danger ms-2">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
</body>
</html>
