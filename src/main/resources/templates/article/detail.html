<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>
    
    <div class="container-fluid p-5 bg-secondary-subtle text-center">
        <div class="row justify-content-center">
            <div class="col-12">
                <h1>Dettaglio</h1>
                <h2 th:text="${title}"></h2>
            </div>
        </div>
    </div>
    
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 d-flex flex-column">
                <!-- Carousel -->
                <div id="carouselExample" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img th:if="${article.image != null}" th:src="${article.image.path}" class="d-block w-100" alt="foto custom">
                            <img th:unless="${article.image != null}" th:src="@{/images/default.jpg}" class="d-block w-100" alt="foto default">
                        </div>
                        <!-- <div class="carousel-item">
                            <img src="..." class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="..." class="d-block w-100" alt="...">
                        </div> -->
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>

                <div class="text-center">
                    <h2 th:text="${article.subtitle}">Sottotitolo</h2>

                    <p class="fs-5" th:if="${article.category != null}">
                        Categoria
                        <a th:href="@{/categories/search/{id}(id=${article.category.id})}" class="text-capitalize fw-bold text-muted" th:text="${article.category.name}">categoria</a>
                    </p>

                    <p class="fs-5" th:if="${article.category == null}">Nessuna categoria</p>

                    <div class="text-muted my-3">
                        <p>Redatto il <span th:text="${article.publishDate}"></span>
                        da </p>
                        <a th:href="@{/search/{id}(id=${article.user.id})}" class="text-muted">
                            <span th:text="${article.user.username}"></span>
                        </a>
                        
                    </div>
                </div>
            </div>

            <p th:text="${article.body}"></p>

            <div class="text-center">
                <a href="" class="text-secondary pointer" onclick="goBack()">Torna indietro</a>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
    <script>
        function goBack(){
            window.history.back();
        }
    </script>
</body>
</html>
