<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>

    <div th:if="${successMessage}">
        <div class="alert alert-success">
            <p th:text="${successMessage}"></p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 mb-5">
                <h1 class="text-center" th:text="${title}"></h1>
            </div>
        </div>
    </div>

    <div class="container" th:if="${articles.size() > 0}">
        <div class="row justify-content-center mb-5">
            <div th:each="article:${articles}" class="col-12 col-md-4 d-flex justify-content-center">
                <div class="card mb-3" style="width: 18rem;">
                    <img th:if="${article.image != null}" th:src="${article.image.path}" class="card-img-top" alt="Foto personale">
                    <img th:unless="${article.image != null}" th:src="@{/images/default.jpg}" class="card-img-top" alt="Foto default">

                    <div class="card-body">
                        <h5 class="card-title" th:text="${article.title}"></h5>
                        <p class="card-text" th:text="${article.subtitle}"></p>
                        <!-- <p class="card-text" th:text="${article.user.username}"></p> -->

                        <a th:href="@{/articles/detail/{id}(id=${article.id})}" class="btn btn-primary">Leggi</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center vh-100" th:unless="${articles.size() > 0}">
        <div class="col-10 mb-5">
            <h1 class="text-center">NESSUN ARTICOLO PRESENTE</h1>
        </div>
    </div>

    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
</body>
</html>
