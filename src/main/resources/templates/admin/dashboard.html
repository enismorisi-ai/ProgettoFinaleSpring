<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{index :: head}"></head>
<body>
    <nav th:replace="~{index :: navbar}"></nav>

    <div th:if="${successMessage}" class="alert alert-success">
        <p th:text="${successMessage}"></p>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-12 my-5 d-flex justify-content-center">
                <h1>Dashboard Admin</h1>
            </div>

            <div class="col-12 my-5 d-flex justify-content-center">
                <span class="h1" th:text="${title}"></span>
            </div>

            <div class="col-12">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Utente</th>
                            <th>Per il ruolo</th>
                            <th>#Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="request:${requests}" class="h-100">
                            <td th:text="${request.user.username}"></td>
                            <td>
                                <span th:text="${request.role.name.substring(5)}"></span>
                            </td>
                            <td>
                                <a th:href="@{/operations/career/request/detail/{id}(id=${request.id})}" class="btn btn-primary m-2">
                                    <span class="d-none d-md-inline">Dettagli</span>
                                    <i class="fa-solid fa-bars"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="col-12 my-5 d-flex justify-content-center align-items-center">
                <span class="h1 mt-0">Tutte le categorie</span>
                <a th:href="@{/categories/create}" class="btn btn-primary ms-4">
                    <span class="d-none d-md-inline">Aggiungi</span>
                    <i class="fa-solid fa-plus"></i>
                </a>
            </div>

            <div class="col-12">
                <table class="table table-striped table-responsive-lg">
                    <thead>
                        <tr>
                            <!-- <th>Id</th> -->
                            <th>Nome</th>
                            <th class="text-end pe-4">#Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category:${categories}">
                            <!-- <td th:text="${category.id}"></td> -->
                            <td th:text="${category.name}"></td>
                            <td class="text-end">
                                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning m-2">
                                    <span class="d-none d-md-inline">Modifica</span>
                                    <i class="fa-solid fa-pencil"></i>
                                </a>
                                <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-danger m-2">
                                    <span class="d-none d-md-inline">Cancella</span>
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>


        </div>
    </div>




    <footer th:replace="~{index :: footer}"></footer>
    <script th:replace="~{index :: script}"></script>
</body>
</html>
